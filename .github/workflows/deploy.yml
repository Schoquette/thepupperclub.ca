name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Marketing Site → GitHub Pages ──────────────────────────────────
  deploy-site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Cloudflare sits in front of the GitHub Pages origin, so a fresh
      # deploy isn't visible to visitors until the edge cache is purged.
      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || true

  # ── API + Web Portal → GoDaddy (FTP) ──────────────────────────────
  deploy-godaddy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install web dependencies
        run: npm install --workspace=web --workspace=shared

      - name: Build web portal
        run: cd web && npx vite build
        env:
          VITE_API_URL: https://thepupperclub.ca
          VITE_STRIPE_KEY: ${{ secrets.VITE_STRIPE_KEY }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: cd api && mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs && composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy API to GoDaddy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./api/
          server-dir: api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/storage/logs/**
            **/storage/app/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            .env

      # Each FTP step writes its own state file so the steps don't
      # delete each other's files. Both target the GoDaddy web root,
      # but they manage disjoint file sets (React shell + marketing
      # static pages).
      - name: Deploy web portal build to GoDaddy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./web/dist/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-web.json

      - name: Deploy marketing site to GoDaddy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./site/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-site.json
          exclude: |
            **/.git*
            **/.git*/**
            **/deploy.log
            CNAME

      - name: Delete cached config before deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./api/bootstrap/cache/
          server-dir: api/bootstrap/cache/
          dangerous-clean-slate: true

      - name: Clear server config cache
        run: |
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" https://thepupperclub.ca/api/clear-cache-9x7k || true

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || true
